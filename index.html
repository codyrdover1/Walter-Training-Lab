<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Walter Call Lab - Kevin Training</title>
  <style>
    body { font-family: Arial, sans-serif; background:#111827; color:#f9fafb; padding:30px; }
    .box { max-width:900px; margin:auto; background:#1f2937; padding:30px; border-radius:16px; }
    h1 { color:#38bdf8; }
    .seller { background:#374151; padding:20px; border-left:5px solid #38bdf8; margin:20px 0; font-size:20px; }
    textarea { width:100%; height:110px; border-radius:10px; padding:15px; font-size:16px; }
    button { background:#38bdf8; color:#111827; border:0; padding:14px 22px; border-radius:10px; font-weight:bold; cursor:pointer; margin-top:12px; }
    .feedback { margin-top:20px; padding:20px; border-radius:10px; background:#111827; }
    .good { border-left:5px solid #22c55e; }
    .bad { border-left:5px solid #ef4444; }
    .warn { border-left:5px solid #f59e0b; }
    .score { display:flex; gap:15px; flex-wrap:wrap; margin-top:20px; }
    .score div { background:#374151; padding:12px 16px; border-radius:10px; }
    .doors { background:#0f172a; padding:15px; border-radius:10px; margin-top:15px; }
  </style>
</head>

<body>
<div class="box">
  <h1>Walter Call Lab</h1>
  <p><strong>Mission:</strong> Don’t move the call forward until you understand the seller’s meaning.</p>

  <div class="score">
    <div>Scenario: <span id="num">1</span>/10</div>
    <div>Depth Score: <span id="score">0</span></div>
    <div>Missed Opportunities: <span id="misses">0</span></div>
    <div>Current Door: <span id="door">None</span></div>
  </div>

  <div class="seller" id="seller"></div>

  <textarea id="answer" placeholder="Kevin, type your response here..."></textarea>
  <br />
  <button onclick="submitAnswer()">Submit Response</button>
  <button onclick="nextScenario()">Next Scenario</button>

  <div id="feedback"></div>
</div>

<script>
const scenarios = [
  {
    seller: "Honestly... the house just feels too big now.",
    clue: "Too big is not just square footage. It could mean kids left, spouse passed, aging, loneliness, maintenance fatigue, or life has changed.",
    bestDoors: ["Meaning", "Relevance", "Purpose"],
    examples: [
      "What changed where it started feeling too big?",
      "How long has it felt that way?",
      "What would feel like a better fit for this stage of life?"
    ]
  },
  {
    seller: "We’re selling because of a divorce.",
    clue: "Divorce usually carries decision tension, emotional fatigue, timeline pressure, and multiple decision makers.",
    bestDoors: ["Meaning", "Relevance", "Description"],
    examples: [
      "What has this process been like for both of you?",
      "Are you both aligned on selling, or is that still being worked through?",
      "Is there a timeline tied to the divorce process?"
    ]
  },
  {
    seller: "I inherited it from my mom, and I just don’t know what to do with it.",
    clue: "Inheritance often combines grief, responsibility, family dynamics, and uncertainty.",
    bestDoors: ["Meaning", "Purpose", "Value"],
    examples: [
      "I’m sorry to hear that. What has carrying this responsibility been like?",
      "What would feel like the right outcome for you and your family?",
      "What has made this decision hard to sort through?"
    ]
  },
  {
    seller: "I’m tired of being a landlord.",
    clue: "Landlord fatigue needs specifics. Tired of tenants, repairs, calls, vacancies, risk, or just the identity of being responsible?",
    bestDoors: ["Description", "Meaning", "Relevance"],
    examples: [
      "What part of being a landlord has worn on you the most?",
      "Was there something that happened recently that made you say enough is enough?",
      "How long have you been feeling that way?"
    ]
  },
  {
    seller: "We’re a few months behind, but we’re not in foreclosure yet.",
    clue: "This is a consequence and urgency door. Kevin must not panic-pitch. He needs to understand risk, timeline, and what they’re trying to protect.",
    bestDoors: ["Relevance", "Purpose", "Description"],
    examples: [
      "What are you trying to avoid happening from here?",
      "Have they given you any kind of deadline or notice yet?",
      "What would a clean exit need to look like for you?"
    ]
  },
  {
    seller: "The house is vacant right now, so we’re just paying bills on it.",
    clue: "Vacancy creates hidden cost: taxes, insurance, utilities, maintenance, vandalism risk, and mental drag.",
    bestDoors: ["Relevance", "Value", "Meaning"],
    examples: [
      "How long has it been sitting vacant?",
      "What is it costing you each month to keep it?",
      "At what point does carrying it start to not make sense?"
    ]
  },
  {
    seller: "My health just isn’t what it used to be, and keeping up with the house is hard.",
    clue: "Health is personal. Slow down. This is not just a timeline clue.",
    bestDoors: ["Meaning", "Value", "Purpose"],
    examples: [
      "What part of keeping up with it has become hardest?",
      "How has that changed your day-to-day life?",
      "What would taking this off your plate make possible for you?"
    ]
  },
  {
    seller: "We’re just seeing what our options are.",
    clue: "Options usually hides a concern. Something prompted the form.",
    bestDoors: ["Relevance", "Purpose", "Meaning"],
    examples: [
      "What prompted you to start looking at options now?",
      "What are you hoping one of those options solves?",
      "If there was an ideal outcome, what would it look like?"
    ]
  },
  {
    seller: "I’ve had other investors call me, so I’m mostly looking for the best price.",
    clue: "Best price is a frame. Kevin needs to discover whether they mean highest number, highest certainty, best net, fastest close, or least hassle.",
    bestDoors: ["Value", "Meaning", "Relevance"],
    examples: [
      "When you say best price, do you mean highest number or best overall certainty?",
      "Besides the number, what would make one offer safer than another?",
      "Have any of those offers explained exactly what could change before closing?"
    ]
  },
  {
    seller: "We want to move, but the house needs work, and we don’t really have the money or time to deal with repairs.",
    clue: "Multiple concerns: move, money, time, repairs, opportunity cost. Kevin needs to prioritize the pressure.",
    bestDoors: ["Relevance", "Value", "Purpose"],
    examples: [
      "Which part is creating the most pressure right now: the move, the repairs, the money, or the time?",
      "What happens to your moving plans if the repairs hold things up?",
      "What would need to happen for this to feel simple?"
    ]
  }
];

const thinkingDoors = {
  Description: ["what exactly", "tell me more", "help me understand", "what part", "what kind", "how much", "how many", "condition", "repairs", "owe", "mortgage"],
  Meaning: ["what has", "what does", "mean", "feel", "felt", "hard", "stress", "like for you", "weighing", "tired", "frustrating"],
  Relevance: ["why now", "what changed", "what prompted", "how long", "at what point", "if nothing changes", "what happens", "deadline", "risk"],
  Value: ["important", "ideal", "best", "matter most", "helpful", "relief", "peace", "easier", "worth", "outcome"],
  Purpose: ["move forward", "next chapter", "trying to accomplish", "hoping to", "future", "what would", "behind you", "free to", "goal"]
};

const badMoves = ["offer", "cash offer", "price", "number", "bedroom", "bathroom", "sqft", "square feet", "roof", "hvac", "repairs", "timeline", "close"];

let current = 0;
let score = 0;
let misses = 0;

function loadScenario() {
  document.getElementById("num").innerText = current + 1;
  document.getElementById("seller").innerText = "Seller: “" + scenarios[current].seller + "”";
  document.getElementById("answer").value = "";
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("door").innerText = "None";
}

function detectDoor(answer) {
  let results = {};

  for (let door in thinkingDoors) {
    results[door] = thinkingDoors[door].filter(word => answer.includes(word)).length;
  }

  let bestDoor = "Unclear";
  let bestScore = 0;

  for (let door in results) {
    if (results[door] > bestScore) {
      bestScore = results[door];
      bestDoor = door;
    }
  }

  return { bestDoor, bestScore };
}

function detectBadMove(answer) {
  return badMoves.some(word => answer.includes(word));
}

function submitAnswer() {
  const ans = document.getElementById("answer").value.toLowerCase();
  const s = scenarios[current];
  const doorResult = detectDoor(ans);
  const badMove = detectBadMove(ans);
  const fb = document.getElementById("feedback");

  document.getElementById("door").innerText = doorResult.bestDoor;

  if (badMove && doorResult.bestScore < 2) {
    misses += 1;
    fb.innerHTML = `
      <div class="feedback bad">
        <h3>🚨 Simulation Paused</h3>
        <p><strong>You moved too fast.</strong></p>
        <p>You jumped toward facts, price, property details, timeline, or offer mechanics before understanding the seller’s meaning.</p>
        <p><strong>Seller clue:</strong> ${s.clue}</p>
        <div class="doors">
          <p><strong>Better doors to open here:</strong> ${s.bestDoors.join(", ")}</p>
          <p><strong>Possible questions:</strong></p>
          <ul>${s.examples.map(e => `<li>${e}</li>`).join("")}</ul>
        </div>
        <p><strong>Retry:</strong> Ask a question that helps you understand what this situation means to the seller.</p>
      </div>`;
  } else if (s.bestDoors.includes(doorResult.bestDoor)) {
    score += 10;
    fb.innerHTML = `
      <div class="feedback good">
        <h3>✅ Strong Interpretive Question</h3>
        <p>You opened the <strong>${doorResult.bestDoor}</strong> door, which fits this seller statement well.</p>
        <p><strong>Walter Coaching:</strong> You did not just collect information. You started interpreting significance.</p>
        <p><strong>Seller clue:</strong> ${s.clue}</p>
        <div class="doors">
          <p><strong>Next layer:</strong> After they answer, listen for consequence. What happens if nothing changes?</p>
        </div>
      </div>`;
  } else if (doorResult.bestDoor !== "Unclear") {
    score += 5;
    fb.innerHTML = `
      <div class="feedback warn">
        <h3>⚠️ Decent Question, But Not Deepest Door</h3>
        <p>You opened the <strong>${doorResult.bestDoor}</strong> door.</p>
        <p>That can work, but this seller statement probably called for: <strong>${s.bestDoors.join(", ")}</strong>.</p>
        <p><strong>Seller clue:</strong> ${s.clue}</p>
        <div class="doors">
          <p><strong>Stronger options:</strong></p>
          <ul>${s.examples.map(e => `<li>${e}</li>`).join("")}</ul>
        </div>
      </div>`;
  } else {
    misses += 1;
    fb.innerHTML = `
      <div class="feedback bad">
        <h3>🚨 Simulation Paused</h3>
        <p>I can’t tell what you were trying to understand.</p>
        <p>A strong question should open one of these doors: Description, Meaning, Relevance, Value, or Purpose.</p>
        <p><strong>Seller clue:</strong> ${s.clue}</p>
        <div class="doors">
          <p><strong>Try one of these:</strong></p>
          <ul>${s.examples.map(e => `<li>${e}</li>`).join("")}</ul>
        </div>
      </div>`;
  }

  document.getElementById("score").innerText = score;
  document.getElementById("misses").innerText = misses;
}

function nextScenario() {
  if (current < scenarios.length - 1) {
    current++;
    loadScenario();
  } else {
    document.getElementById("seller").innerText = "Training Complete.";
    document.getElementById("feedback").innerHTML = `
      <div class="feedback good">
        <h2>Final Score: ${score}/100</h2>
        <p><strong>Missed Opportunities:</strong> ${misses}</p>
        <p><strong>Walter Summary:</strong> Kevin’s goal is not to memorize questions. His goal is to recognize which door the seller just opened: Description, Meaning, Relevance, Value, or Purpose.</p>
        <p>If the seller gives emotional weight, stay there. If the seller gives a vague reason, clarify. If the seller gives pressure, uncover consequence. If the seller talks price, redefine value.</p>
      </div>`;
  }
}

loadScenario();
</script>
</body>
</html>
